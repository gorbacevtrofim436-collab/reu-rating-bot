name: Daytime keepalive

on:
  schedule:
    # 07:00-22:50 Moscow time. GitHub cron uses UTC.
    - cron: "*/10 4-19 * * *"
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render health endpoint
        env:
          KEEPALIVE_URL: https://reu-rating-bot.onrender.com/health
        run: |
          curl --fail --show-error --silent \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            "$KEEPALIVE_URL"
