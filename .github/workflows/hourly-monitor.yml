name: Hourly rating monitor

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

jobs:
  trigger-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Render monitor endpoint
        env:
          MONITOR_RUN_URL: ${{ secrets.MONITOR_RUN_URL }}
          MONITOR_RUN_SECRET: ${{ secrets.MONITOR_RUN_SECRET }}
        run: |
          test -n "$MONITOR_RUN_URL"
          test -n "$MONITOR_RUN_SECRET"
          curl --fail --show-error --silent \
            --max-time 60 \
            --retry 2 \
            --retry-delay 10 \
            -X POST "$MONITOR_RUN_URL" \
            -H "X-Monitor-Secret: $MONITOR_RUN_SECRET"
