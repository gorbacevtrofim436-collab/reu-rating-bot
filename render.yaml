services:
  - type: web
    name: reu-rating-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: RUN_MODE
        value: webhook
      - key: PORT
        value: 10000
      - key: MONITOR_ENABLED
        value: true
      - key: MONITOR_BACKGROUND_ENABLED
        value: false
      - key: MONITOR_RUN_SECRET
        sync: false
      - key: MONITOR_INTERVAL_SECONDS
        value: 3600
      - key: MONITOR_INITIAL_DELAY_SECONDS
        value: 60
      - key: MONITOR_USER_DELAY_SECONDS
        value: 120
      - key: MONITOR_STOP_ON_TRANSIENT_FAILURE
        value: true
      - key: MONITOR_JITTER_SECONDS
        value: 60
      - key: INTERACTIVE_REFRESH_COOLDOWN_SECONDS
        value: 21600
      - key: INITIAL_SYNC_RETRY_DELAYS_SECONDS
        value: 0,20,40
      - key: INITIAL_SYNC_DEADLINE_SECONDS
        value: 60
      - key: INITIAL_SYNC_ATTEMPT_TIMEOUT_SECONDS
        value: 25
      - key: BOT_TOKEN
        sync: false
      - key: BOT_CREDENTIAL_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REA_RATING_URL
        value: https://student.rea.ru/rating/index.php?login=yes&semester=2-й+семестр
      - key: REA_LOGIN_URL
        value: https://student.rea.ru/
      - key: REA_REQUEST_TIMEOUT
        value: 25
      - key: REA_HTTP_RETRIES
        value: 0
      - key: REA_HTTP_CONNECT_RETRIES
        value: 0
      - key: REA_HTTP_READ_RETRIES
        value: 0
      - key: REA_HTTP_STATUS_RETRIES
        value: 0
      - key: REA_LESSONS_URL
        value: https://student.rea.ru/lessons/index.php?login=yes
      - key: REA_SCHEDULE_REQUEST_TIMEOUT
        value: 25
